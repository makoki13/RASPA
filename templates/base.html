<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RASPA{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-raspa { background-color: #dc3545; }
        .navbar-raspa .navbar-brand { color: white; font-weight: bold; }
        .container-main { margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg navbar-raspa">
        <div class="container">
            <a class="navbar-brand" href="/">🚴‍♂️ RASPA (Race Across Spain)</a>
            <div class="ml-auto">
                <a href="/panel" class="btn btn-light btn-sm">Mi Panel</a>
            </div>
        </div>
    </nav>

    <!-- Aquí irá el contenido de cada página -->
    <div class="container container-main">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS (Necesario para los menús desplegables) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
