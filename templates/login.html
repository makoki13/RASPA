{% extends "base.html" %}

{% block title %}Iniciar Sesión - RASPA{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">🚴‍♂️ Accede a RASPA</h3>
                
                <!-- Si hay error, lo mostramos aquí -->
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <!-- Formulario que envía datos a /login -->
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Entrar al Panel</button>
                </form>
                
                <p class="text-muted text-center mt-3" style="font-size: 0.8em;">
                    Si nunca has enviado una ruta, no tendrás contraseña.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
