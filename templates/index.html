<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASPA - Race Across Spain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('/static/spain_map.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #f8f9fa; /* Color por si la imagen tarda en cargar */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .splash-container {
            background-color: rgba(255, 255, 255, 0.85); /* Fondo blanco semitransparente para leer bien */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 { color: #dc3545; font-weight: 900; letter-spacing: 2px; margin-bottom: 0;}
        h5 { color: #6c757d; }
        .btn-raspa { width: 100%; margin-bottom: 10px; font-size: 1.1rem; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="col-md-6 offset-md-3 splash-container">
            <h1 class="display-2">RASPA</h1>
            <h5 class="mb-5">(Race Across Spain)</h5>
            
            <div class="d-grid gap-2">
                <a href="/login" class="btn btn-danger btn-raspa">🚴‍♂️ Entrar</a>
                <a href="/registro" class="btn btn-outline-danger btn-raspa">📝 Registrarse</a>
                <a href="/ranking" class="btn btn-outline-dark btn-raspa">🏆 Ver Ranking</a>
                <a href="/ayuda" class="btn btn-outline-secondary btn-raspa">❓ Ayuda</a>
            </div>
        </div>
    </div>
</body>
</html>
