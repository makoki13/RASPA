{% extends "base.html" %}

{% block title %}Registro - RASPA{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">📝 Registro de nuevo ciclista</h3>
                
                {% if msg %}<div class="alert alert-info text-center">{{ msg }}</div>{% endif %}

                <form action="/registro" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre de usuario</label>
                        <input type="text" class="form-control" name="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmación de correo electrónico</label>
                        <input type="email" class="form-control" name="email_confirm" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 mb-3">Registrarse</button>
                    <a href="/" class="btn btn-outline-secondary w-100">⬅️ Atrás</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
