{% extends "base.html" %}

{% block title %}Ranking RASPA{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-dark text-white">
        <h4 class="mb-0">🏆 Ranking Global de Ciclistas</h4>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th width="50">#</th>
                    <th>Ciclista</th>
                    <th width="150" class="text-end">Puntos</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in ranking %}
                <tr class="
                    {% if loop.index == 1 %}table-warning{% endif %}
                    {% if loop.index == 2 %}table-secondary{% endif %}
                    {% if loop.index == 3 %}table-info{% endif %}
                ">
                    <th>{{ loop.index }}</th>
                    <td>{{ usuario.nombre }}</td>
                    <td class="text-end"><strong>{{ usuario.puntos }}</strong></td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center p-3">Aún no hay ciclistas.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
